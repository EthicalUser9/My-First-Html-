<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <meta name="description" content="Search and list second-hand cars by make, model, and fuel type.">
    <title>Ste's Car Search</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <noscript>
      <p>This car search requires JavaScript to be enabled.</p>
    </noscript>
    <h1>Ste's Car Search</h1>
    <label>
      Search
      <input type="text" id="search-bar" placeholder="By Make or Model.">
    </label>
    <label>
      Filter by Fuel Type
      <select id="filter-fueltype">
        <option value="">All Fuel Types</option>
        <option value="Petrol">Petrol</option>
        <option value="Diesel">Diesel</option>
        <option value="Hybrid">Hybrid</option>
        <option value="Electric">Electric</option>
      </select>
    </label>
    <form id="add-car-form">
        <h2>Add a Car</h2>
        <label>
          Fuel Type
          <select id="input-fueltype">
            <option value="">Select fuel type</option>
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="Hybrid">Hybrid</option>
            <option value="Electric">Electric</option>
          </select>
        </label>
        <label>
          Make
          <input type="text" id="input-make" placeholder="(Ford)" maxlength="30">
        </label>
        <label>
          Model
          <input type="text" id="input-model" placeholder="(Focus)" maxlength="30">
        </label>
        <label>
          Colour
          <input type="text" id="input-colour" placeholder="(Red)" maxlength="30">
        </label>
        <label>
          Year
          <input type="number" id="input-year" placeholder="(2026)" min="1900" max="2030">
        </label>
        <label>
          Mileage
          <input type="number" id="input-mileage" placeholder="(50000)" min="0">
        </label>
        <label>
          Price (£)
          <input type="number" id="input-price" placeholder="(5400)" min="0" max="100000">
        </label>
        <button type="submit" id="add-car-btn">Add Car</button>
    </form>
    <p id="form-error" class="error-message"></p>
    <section id="car-listings" aria-live="polite"></section>

    <script src="script.js"></script>
  </body>
</html>
