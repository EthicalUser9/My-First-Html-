<!DOCTYPE html>
<html>
  <head>
    <style> /* https://htmlcheatsheet.com/css/ */
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        #search-bar {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
        }
        #car-listings {
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* Gap works in Visual Stuido */
        }
        #add-car-form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }
        #add-car-form button {
            padding: 8px 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .car-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            width: 280px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .price {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
        }
        .car-card button {
            margin-top: 10px;
            padding: 6px 12px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .car-card button:hover {
            background-color: #c0392b;
        }
        .invalid {
            border: 2px solid #e74c3c !important;
        }

    </style>
    <title>Ste's Car Search</title>
  </head>
  <body>
    <h1>🚗 Ste's Car Search</h1> <!-- Car icon works in Visual Studio  -->
    <input type="text" id="search-bar" placeholder="Search by make or model.">
    <div id="add-car-form">
        <h2>Add a Car</h2>
        <input type="text" id="input-make" placeholder="Make (e.g. Ford)">
        <input type="text" id="input-model" placeholder="Model (e.g. Focus)">
        <input type="text" id="input-colour" placeholder="Colour (e.g. Red)">
        <input type="number" id="input-year" placeholder="Year (e.g. 2020)" min="1900" max="2030">
        <input type="number" id="input-price" placeholder="Price (e.g. 5400)" min="0" max="100000">
        <input type="number" id="input-mileage" placeholder="Mileage (e.g. 50000)" min="0">
        <button onclick="addCar()">Add Car</button>
    </div>
    <div id="car-listings"> </div>

    <script>
        const cars =[
            {id: 1, make: "Ford", model: "Focus", year: 2019, price: 8500, mileage: 45000, colour: "Blue" },
            {id: 2, make: "BMW", model: "3 Series", year: 2020, price: 22000, mileage: 30000, colour:"Black"},
            {id: 3, make: "Toyota", model: "Corolla", year: 2018, price: 5000, mileage: 60000, colour:"Red"},
            {id: 4, make: "Audi", model: "A3", year: 2021, price: 25000, mileage: 15000, colour:"Silver"},
            {id: 5, make: "Volkswagen", model: "Golf", year: 2019, price: 8500, mileage: 40000, colour:"Grey"},
            {id: 6, make: "Mercedes", model: "C-Class", year: 2020, price: 28000, mileage: 22000, colour:"White"},
        ];

        let nextId = 7;

    function displayCars(carList) {
        const listings = document.getElementById("car-listings");
        listings.innerHTML = "";

        if (carList.length === 0) {
            listings.innerHTML = '<p class="no-results">No cars found.</p>';
                return;
        }
        carList.forEach(car => {
            // Icons work in Visual Studio
            listings.innerHTML += ` 
            <div class="car-card">
                <h2> ${car.make} ${car.model}</h2>
                <p> 📅 Year: ${car.year}</p>
                <p> 🎨 Colour: ${car.colour}</p>
                <p> 📍 Mileage: ${car.mileage.toLocaleString() } miles </p>
                <p class="price"> £${car.price.toLocaleString()} </p> 
                <button onclick="deleteCar(${car.id})"> Delete</button>
            </div>
         ` ;
        });
    }
    function getFilteredCars() {
        const searchTerm = document.getElementById("search-bar").value.toLowerCase();
        if (!searchTerm) return cars;
        return cars.filter(car =>
            car.make.toLowerCase().includes(searchTerm) ||
            car.model.toLowerCase().includes(searchTerm)
        );
    }

    document.getElementById("search-bar").addEventListener("input", () => {
        displayCars(getFilteredCars());
    });

    function deleteCar(id) {
        const index = cars.findIndex(car => car.id === id);
        if (index !== -1) {
            cars.splice(index, 1);
        }

displayCars(getFilteredCars());

    }
    
    function addCar() {
        const fields = {
        make: document.getElementById("input-make"),
        model: document.getElementById("input-model"),
        year: document.getElementById("input-year"),
        price: document.getElementById("input-price"),
        mileage: document.getElementById("input-mileage"),
        colour: document.getElementById("input-colour"),
  };

  let valid = true;

  Object.values(fields).forEach(f => f.classList.remove("invalid"));

  Object.entries(fields).forEach(([key, field]) => {
    if (!field.value.trim()) {
      field.classList.add("invalid");
      valid = false;
    }
  });

  const year = parseInt(fields.year.value);
  const price = parseInt(fields.price.value);
  const mileage = parseInt(fields.mileage.value);

  if (fields.year.value && (year < 1900 || year > 2030)) {
    fields.year.classList.add("invalid");
    valid = false;
  }
  if (fields.price.value && (price < 0 || price > 100000)) {
    fields.price.classList.add("invalid");
    valid = false;
  }
  if (fields.mileage.value && mileage < 0) {
    fields.mileage.classList.add("invalid");
    valid = false;
  }

  if (!valid) {
    alert("Please check the highlighted fields.");
    return;
  }

  cars.push({
    id: nextId++,
    make: fields.make.value.trim(),
    model: fields.model.value.trim(),
    year: year,
    price: price,
    mileage: mileage,
    colour: fields.colour.value.trim(),
  });

  Object.values(fields).forEach(f => f.value = "");
  displayCars(getFilteredCars());
}

displayCars(cars);

    </script>
  </body>
</html>
